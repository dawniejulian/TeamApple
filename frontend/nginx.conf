server_names_hash_bucket_size 64;

server {
  listen 3000;
  server_name 206.237.98.213 teamapple.my.id www.teamapple.my.id pgadmin.teamapple.my.id;

  return 301 https://$host$request_uri;
}

server {
  listen 3000 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to backend container
  location /api/ {
    proxy_pass http://backend:5000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy upload assets to backend container
  location /uploads/ {
    proxy_pass http://backend:5000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Serve embedded TeamApple static site directly
  location /teamapple/ {
    try_files $uri $uri/ /teamapple/index.html;
  }

  # React SPA fallback for app routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 3443 ssl;
  server_name 206.237.98.213 teamapple.my.id www.teamapple.my.id pgadmin.teamapple.my.id _;

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to backend container
  location /api/ {
    proxy_pass http://backend:5000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy upload assets to backend container
  location /uploads/ {
    proxy_pass http://backend:5000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Serve embedded TeamApple static site directly
  location /teamapple/ {
    try_files $uri $uri/ /teamapple/index.html;
  }

  # React SPA fallback for app routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}
