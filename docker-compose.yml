services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: kasirin_db
    environment:
      POSTGRES_DB: kasirin_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema_v2.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kasirin_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kasirin_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: kasirin_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: kasirin_jwt_secret_2024_secure
      FRONTEND_URL: ${FRONTEND_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - kasirin_network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: AUTO
    container_name: kasirin_frontend
    ports:
      - "3001:3000"
      - "3002:3443"
      # Expose frontend on VPS public IP standard HTTP/HTTPS
      - "${FRONTEND_VPS_BIND_1:-206.237.98.213:80:3000}"
      - "${FRONTEND_VPS_BIND_2:-206.237.98.213:443:3443}"
    depends_on:
      - backend
      - pgadmin
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - "${SSL_CERT_PATH:-./frontend/certs/local-selfsigned.crt}:/etc/ssl/certs/nginx-selfsigned.crt:ro"
      - "${SSL_KEY_PATH:-./frontend/certs/local-selfsigned.key}:/etc/ssl/private/nginx-selfsigned.key:ro"
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - kasirin_network
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: AUTO

  # pgAdmin Database Management GUI
  pgadmin:
    image: dpage/pgadmin4
    container_name: kasirin_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kasirin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword123
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kasirin_network
    restart: unless-stopped

  # Let's Encrypt Certbot for Automated SSL Renewals
  certbot:
    image: certbot/certbot:v2.9.0
    container_name: kasirin_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - kasirin_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kasirin_network:
    driver: bridge
