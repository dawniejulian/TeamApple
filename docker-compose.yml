version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: kasirin_db
    environment:
      POSTGRES_DB: kasirin_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kasirin_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kasirin_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: kasirin_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kasirin_network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kasirin_frontend
    ports:
      - "3000:3000"
    networks:
      - kasirin_network
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

volumes:
  postgres_data:

networks:
  kasirin_network:
    driver: bridge
